<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maretti</title>
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #111;
      font-family: Arial, sans-serif;
    }

    .header {
      position: relative;
      padding-top: 20px;
    }

    .top-logo {
      position: absolute;
      top: 20px;
      left: 24px;
      z-index: 10;
    }

    .top-logo img {
      height: 56px;
      width: auto;
      display: block;
    }

    .menu-bar {
      margin-top: 90px;
      background: #e62648;
      padding: 12px 20px;
      text-align: center;
    }

    .menu {
      display: inline-flex;
      gap: 36px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .menu a {
      color: #ffffff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      line-height: 1;
    }

    .menu a:hover {
      opacity: 0.8;
    }

    .hero {
      min-height: calc(100vh - 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .wrapper {
      text-align: center;
      max-width: 90%;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 96px;
      font-weight: normal;
      line-height: 1;
      color: #111;
      font-family: "Harlow Solid Italic", cursive;
    }

    .italy-flag-line {
      width: 360px;
      height: 16px;
      display: flex;
      margin: 0 auto 28px;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .italy-flag-line div {
      flex: 1;
    }

    .green {
      background: #009246;
    }

    .white {
      background: #ffffff;
    }

    .red {
      background: #ce2b37;
    }

    .subtitle {
      margin: 0;
      font-size: 28px;
      color: #444;
      letter-spacing: 0.5px;
    }

    .catalog-link {
      margin-top: 32px;
    }

    .catalog-link a {
      font-size: 20px;
      color: #009246;
      text-decoration: none;
      border-bottom: 1px solid #009246;
      padding-bottom: 2px;
      transition: all 0.2s ease;
    }

    .catalog-link a:hover {
      color: #ce2b37;
      border-bottom-color: #ce2b37;
    }

    @media (max-width: 768px) {
      .top-logo {
        top: 14px;
        left: 16px;
      }

      .top-logo img {
        height: 42px;
      }

      .menu-bar {
        margin-top: 72px;
        padding: 10px 14px;
      }

      .menu {
        gap: 16px;
      }

      .menu a {
        font-size: 14px;
      }

      h1 {
        font-size: 64px;
      }

      .italy-flag-line {
        width: 260px;
        height: 12px;
      }

      .subtitle {
        font-size: 20px;
      }

      .catalog-link a {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="top-logo">
      <img src="pictures/logo.png" alt="Maretti logo" />
    </div>

    <div class="menu-bar">
      <nav class="menu">
        <a href="#">Главная</a>
        <a href="#">О бренде</a>
        <a href="#">Сотрудничество</a>
        <a href="#">Сервис</a>
        <a href="#">Контакты</a>
      </nav>
    </div>
  </header>

  <main class="hero">
    <div class="wrapper">
      <h1>Maretti</h1>

      <div class="italy-flag-line">
        <div class="green"></div>
        <div class="white"></div>
        <div class="red"></div>
      </div>

      <p class="subtitle">Сайт скоро будет доступен</p>

      <p class="catalog-link">
        <a href="Catalog%20Maretti%202026.pdf" download>Скачать каталог Maretti 2026</a>
      </p>
    </div>
  </main>
</body>
</html>
