<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Maretti</title>

  <!-- Положи файл favicon.png рядом с index.html -->
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: "Harlow Solid Italic", cursive;
    }

    .wrapper {
      text-align: center;
      padding: 20px;
      max-width: 90%;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 96px;
      font-weight: normal;
      line-height: 1;
      color: #111;
    }

    .italy-flag-line {
      width: 360px;
      height: 16px;
      display: flex;
      margin: 0 auto 28px;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .italy-flag-line div {
      flex: 1;
    }

    .green {
      background: #009246;
    }

    .white {
      background: #ffffff;
    }

    .red {
      background: #ce2b37;
    }

    .subtitle {
      margin: 0;
      font-size: 28px;
      color: #444;
      font-family: Arial, sans-serif;
      letter-spacing: 0.5px;
    }

    .catalog-link {
      margin-top: 32px;
    }

    .catalog-link a {
      font-family: Arial, sans-serif;
      font-size: 20px;
      color: #009246;
      text-decoration: none;
      border-bottom: 1px solid #009246;
      padding-bottom: 2px;
      transition: all 0.2s ease;
    }

    .catalog-link a:hover {
      color: #ce2b37;
      border-bottom-color: #ce2b37;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 64px;
      }

      .italy-flag-line {
        width: 260px;
        height: 12px;
        margin-bottom: 22px;
      }

      .subtitle {
        font-size: 20px;
      }

      .catalog-link a {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Maretti</h1>

    <div class="italy-flag-line">
      <div class="green"></div>
      <div class="white"></div>
      <div class="red"></div>
    </div>

    <p class="subtitle">Сайт скоро будет доступен</p>

    <p class="catalog-link">
      <a href="Catalog%20Maretti%202026.pdf" download>
        Скачать каталог Maretti 2026
      </a>
    </p>
  </div>
</body>
</html>
